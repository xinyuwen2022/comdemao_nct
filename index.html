<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>成绩单分析系统</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: #f0f4f8; color: #2d3748; min-height: 100vh; }
  .header { background: linear-gradient(135deg, #1a56db 0%, #1e40af 100%); color: white; padding: 24px 32px; box-shadow: 0 2px 8px rgba(26,86,219,0.3); }
  .header h1 { font-size: 22px; font-weight: 600; letter-spacing: 1px; }
  .header p { font-size: 13px; opacity: 0.8; margin-top: 4px; }
  .container { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
  .upload-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  .upload-card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .upload-card h3 { font-size: 14px; font-weight: 600; color: #4a5568; margin-bottom: 4px; }
  .upload-card p { font-size: 12px; color: #a0aec0; margin-bottom: 16px; }
  .drop-zone { border: 2px dashed #cbd5e0; border-radius: 8px; padding: 28px 16px; text-align: center; cursor: pointer; transition: all 0.2s; position: relative; }
  .drop-zone:hover, .drop-zone.drag-over { border-color: #1a56db; background: #eff6ff; }
  .drop-zone.has-file { border-color: #38a169; background: #f0fff4; }
  .drop-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .drop-icon { font-size: 32px; margin-bottom: 8px; }
  .drop-text { font-size: 13px; color: #718096; }
  .drop-text strong { color: #1a56db; }
  .file-name { font-size: 13px; color: #38a169; font-weight: 500; margin-top: 6px; }
  .btn-analyze { width: 100%; padding: 14px; background: linear-gradient(135deg, #1a56db, #1e40af); color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-bottom: 24px; letter-spacing: 1px; }
  .btn-analyze:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(26,86,219,0.4); }
  .btn-analyze:disabled { background: #a0aec0; cursor: not-allowed; transform: none; box-shadow: none; }
  .loading { display: none; text-align: center; padding: 40px; }
  .spinner { width: 40px; height: 40px; border: 3px solid #e2e8f0; border-top-color: #1a56db; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box { background: #fff5f5; border: 1px solid #fed7d7; border-radius: 10px; padding: 16px 20px; color: #c53030; font-size: 14px; margin-bottom: 20px; display: none; }
  .results { display: none; }
  .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .result-header h2 { font-size: 18px; font-weight: 600; }
  .btn-download { padding: 10px 24px; background: #38a169; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
  .btn-download:hover { background: #2f855a; transform: translateY(-1px); }
  .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 24px; }
  .stat-card { background: white; border-radius: 10px; padding: 18px 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
  .stat-card .label { font-size: 12px; color: #718096; margin-bottom: 6px; }
  .stat-card .value { font-size: 24px; font-weight: 700; color: #1a56db; }
  .stat-card .sub { font-size: 11px; color: #a0aec0; margin-top: 2px; }
  .session-card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); margin-bottom: 20px; }
  .session-title { font-size: 15px; font-weight: 600; color: #1a56db; border-bottom: 2px solid #ebf4ff; padding-bottom: 12px; margin-bottom: 18px; }
  .metrics-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .metrics-table th { background: #f7fafc; padding: 10px 14px; text-align: left; font-weight: 600; color: #4a5568; border-bottom: 2px solid #e2e8f0; }
  .metrics-table td { padding: 9px 14px; border-bottom: 1px solid #f0f4f8; }
  .metrics-table tr:last-child td { border-bottom: none; }
  .metrics-table tr:hover td { background: #f7fafc; }
  .section-row td { background: #eff6ff !important; font-weight: 600; color: #1e40af; font-size: 12px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 500; }
  .badge-pass { background: #c6f6d5; color: #276749; }
  .badge-fail { background: #fed7d7; color: #9b2c2c; }
  @media (max-width: 640px) { .upload-section { grid-template-columns: 1fr; } .summary-grid { grid-template-columns: 1fr 1fr; } }
  .tab-bar { background: #fff; border-bottom: 2px solid #e2e8f0; padding: 0 32px; display: flex; gap: 4px; }
  .tab { background: none; border: none; border-bottom: 3px solid transparent; padding: 14px 20px; font-size: 14px; font-weight: 600; color: #718096; cursor: pointer; transition: all 0.2s; margin-bottom: -2px; }
  .tab.active { color: #1a56db; border-bottom-color: #1a56db; }
  .tab:hover:not(.active) { color: #4a5568; background: #f7fafc; }
</style>
</head>
<body>
<div class="header">
  <h1>📊 成绩单分析系统</h1>
  <p>上传用户总表和成绩明细，自动生成分析报告</p>
</div>
<div class="tab-bar">
  <button class="tab active" id="tab-dual"   onclick="switchTab('dual')"> C++双表分析（分渠道）</button>
  <button class="tab"        id="tab-single" onclick="switchTab('single')"> C++单表统计</button>
  <button class="tab"        id="tab-python" onclick="switchTab('python')"> AP单表统计</button>
</div>

<div class="container">

  <!-- ── 双表分析 ── -->
  <div id="section-dual">
    <div class="upload-section">
      <div class="upload-card">
        <h3>📋 用户总表</h3>
        <p>含「是否为AIC++学员」字段的 Excel 文件</p>
        <div class="drop-zone" id="drop1">
          <input type="file" id="file1" accept=".xlsx,.xls,.csv">
          <div class="drop-icon">📁</div>
          <div class="drop-text">拖拽文件到此处，或<strong>点击选择</strong></div>
          <div class="file-name" id="name1"></div>
        </div>
      </div>
      <div class="upload-card">
        <h3>📝 成绩明细</h3>
        <p>含多个场次 Sheet 的 Excel 文件</p>
        <div class="drop-zone" id="drop2">
          <input type="file" id="file2" accept=".xlsx,.xls">
          <div class="drop-icon">📁</div>
          <div class="drop-text">拖拽文件到此处，或<strong>点击选择</strong></div>
          <div class="file-name" id="name2"></div>
        </div>
      </div>
    </div>
    <div style="display:flex;gap:12px;margin-bottom:24px">
      <button class="btn-analyze" id="btnAnalyze" onclick="analyze()" style="margin-bottom:0;flex:1">开始分析</button>
      <button onclick="resetAll()" style="padding:14px 24px;background:white;border:2px solid #cbd5e0;border-radius:10px;font-size:15px;font-weight:600;color:#718096;cursor:pointer;white-space:nowrap">↺ 重新上传</button>
    </div>
  </div>

  <!-- ── 单表统计 ── -->
  <div id="section-single" style="display:none">
    <div class="upload-section" style="grid-template-columns:1fr">
      <div class="upload-card">
        <h3>📝 成绩明细</h3>
        <p>含多个场次 Sheet 的 Excel 文件（无需总表）</p>
        <div class="drop-zone" id="drop3">
          <input type="file" id="file3" accept=".xlsx,.xls,.csv">
          <div class="drop-icon">📁</div>
          <div class="drop-text">拖拽文件到此处，或<strong>点击选择</strong></div>
          <div class="file-name" id="name3"></div>
        </div>
      </div>
    </div>
    <div style="display:flex;gap:12px;margin-bottom:24px">
      <button class="btn-analyze" id="btnAnalyzeSingle" onclick="analyzeSingle()" style="margin-bottom:0;flex:1">开始统计</button>
      <button onclick="resetAll()" style="padding:14px 24px;background:white;border:2px solid #cbd5e0;border-radius:10px;font-size:15px;font-weight:600;color:#718096;cursor:pointer;white-space:nowrap">↺ 重新上传</button>
    </div>
  </div>

  <!-- ── Python AI 单表（含判断题）── -->
  <div id="section-python" style="display:none">
    <div class="upload-section" style="grid-template-columns:1fr">
      <div class="upload-card">
        <h3>📝 Python AI 成绩明细</h3>
        <p>含单选题、判断题、编程题的 Excel 文件（无需总表）</p>
        <div class="drop-zone" id="drop4">
          <input type="file" id="file4" accept=".xlsx,.xls,.csv">
          <div class="drop-icon">📁</div>
          <div class="drop-text">拖拽文件到此处，或<strong>点击选择</strong></div>
          <div class="file-name" id="name4"></div>
        </div>
      </div>
    </div>
    <div style="display:flex;gap:12px;margin-bottom:24px">
      <button class="btn-analyze" id="btnAnalyzePython" onclick="analyzePython()" style="margin-bottom:0;flex:1">开始统计</button>
      <button onclick="resetAll()" style="padding:14px 24px;background:white;border:2px solid #cbd5e0;border-radius:10px;font-size:15px;font-weight:600;color:#718096;cursor:pointer;white-space:nowrap">↺ 重新上传</button>
    </div>
  </div>

  <div class="error-box" id="errorBox"></div>
  <div class="loading" id="loading"><div class="spinner"></div><div style="color:#718096;font-size:14px">正在分析中，请稍候…</div></div>

  <div class="results" id="results">
    <div class="result-header">
      <h2>分析结果</h2>
      <button class="btn-download" id="dlBtn">⬇️ 下载 result.xlsx</button>
    </div>
    <div id="resultContent"></div>
  </div>
</div>

<script>
const GROUP_COL = '是否为AIC++学员';
const CERT_COL  = '准考证号';
const META_COLS = new Set(['考生姓名','用户id','用户ID','准考证号','报考机构','缺考标记','场次']);
const SCORE_EXCELLENT = 90, SCORE_GOOD = 75, SCORE_PASS = 60;

let file1Data=null, file2Data=null, file3Data=null, file4Data=null;
let lastSessionMetrics=[], lastObjCols=[], lastSubCols=[], lastMTotal=null;
let lastPyMetrics=[], lastPyObjCols=[], lastPyJudgeCols=[], lastPySubCols=[], lastPyMTotal=null;

// ── Tab ──────────────────────────────────────────────────────
function switchTab(tab) {
  ['dual','single','python'].forEach(t => {
    document.getElementById('section-'+t).style.display = t===tab ? '' : 'none';
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
  });
  document.getElementById('results').style.display = 'none';
  hideError();
}

// ── 文件拖拽/选择 ────────────────────────────────────────────
[1,2,3,4].forEach(n => {
  const zone=document.getElementById('drop'+n), input=document.getElementById('file'+n);
  zone.addEventListener('dragover', e=>{e.preventDefault();zone.classList.add('drag-over');});
  zone.addEventListener('dragleave', ()=>zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e=>{e.preventDefault();zone.classList.remove('drag-over');const f=e.dataTransfer.files[0];if(f)handleFile(f,n);});
  input.addEventListener('change', ()=>{if(input.files[0])handleFile(input.files[0],n);});
});

function handleFile(f,n) {
  document.getElementById('name'+n).textContent='✅ '+f.name;
  document.getElementById('drop'+n).classList.add('has-file');
  const reader=new FileReader();
  reader.onload=e=>{
    const d={name:f.name,buf:e.target.result};
    if(n===1)file1Data=d; else if(n===2)file2Data=d; else if(n===3)file3Data=d; else file4Data=d;
  };
  reader.readAsArrayBuffer(f);
}

function showError(msg){const b=document.getElementById('errorBox');b.textContent='⚠️ '+msg;b.style.display='block';}
function hideError(){document.getElementById('errorBox').style.display='none';}
function readWorkbook(buf){return XLSX.read(new Uint8Array(buf),{type:'array',cellDates:true});}

function sheetToRows(ws) {
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
  if(!rows.length)return[];
  const seen={};
  const headers=rows[0].map(h=>{
    const s=h==null?'':String(h).trim();
    seen[s]=(seen[s]||0)+1;
    return seen[s]===1?s:s+'__'+seen[s];
  });
  return rows.slice(1).map(r=>{const o={};headers.forEach((h,i)=>o[h]=r[i]==null?null:r[i]);return o;});
}

function scoreStatus(s){const n=parseFloat(s)||0;return n>=SCORE_EXCELLENT?'优秀':n>=SCORE_GOOD?'良好':n>=SCORE_PASS?'合格':'不合格';}
function avg(rows,col){const v=rows.map(r=>parseFloat(r[col])).filter(v=>!isNaN(v));return v.length?(v.reduce((a,b)=>a+b,0)/v.length).toFixed(1):'N/A';}
function pctNum(a,b){return b?parseFloat((a/b*100).toFixed(2)):0;}
function gradeStr(g){return `优秀 ${g[0]} / 良好 ${g[1]} / 合格 ${g[2]}`;}

function cleanData(rows){
  return rows.filter(r=>{
    const ak=Object.keys(r).find(k=>k.includes('缺考'));
    if(ak&&String(r[ak]).trim()!=='正常')return false;
    if(/测试|备用|test/i.test(String(r['考生姓名']||'')))return false;
    return true;
  });
}

// ── 双表解析 ─────────────────────────────────────────────────
function parseScoreSheet(rows){
  if(!rows.length)return{rows,objCols:[],subCols:[]};
  const headers=Object.keys(rows[0]);
  const dataCols=headers.filter(h=>!META_COLS.has(h)&&h!=='');
  let data=rows;
  if(dataCols.length&&/^\d+$/.test(String(rows[0][dataCols[0]]||'').trim()))data=rows.slice(1);
  const objCols=headers.filter(h=>h.includes('单项')||(h.includes('选择')&&!h.includes('编程')));
  const subCols=headers.filter(h=>h.includes('编程')||h.includes('操作'));
  data=data.map(r=>{const nr={...r};[...objCols,...subCols].forEach(c=>{nr[c]=parseFloat(nr[c])||0;});return nr;});
  return{rows:data,objCols,subCols};
}

function joinScores(userRows,scoreRows,objCols,subCols){
  const lk={};
  userRows.forEach(u=>{const k=String(u[CERT_COL]||'').trim();if(k)lk[k]=u[GROUP_COL]||'非AIC++';});
  return scoreRows.map(s=>{
    const m={...s};
    m[GROUP_COL]=lk[String(s[CERT_COL]||'').trim()]||'非AIC++';
    objCols.forEach(c=>{m[c]=parseFloat(s[c])||0;});
    subCols.forEach(c=>{m[c]=parseFloat(s[c])||0;});
    if(objCols.length)m['客观题得分']=objCols.reduce((a,c)=>a+(m[c]||0),0);
    if(subCols.length)m['主观题得分']=subCols.reduce((a,c)=>a+(m[c]||0),0);
    m['卷面成绩']=[...objCols,...subCols].reduce((a,c)=>a+(m[c]||0),0);
    m['通过状态']=scoreStatus(m['卷面成绩']);
    return m;
  });
}

function computeMetrics(rows,objCols,subCols){
  if(!rows.length)return null;
  const aic=rows.filter(r=>r[GROUP_COL]==='AIC++'), cpp=rows.filter(r=>r[GROUP_COL]!=='AIC++'), total=rows.length;
  const pass=sub=>sub.filter(r=>{const s=parseFloat(r['卷面成绩']);return!isNaN(s)&&s>=SCORE_PASS;}).length;
  const gc=sub=>{let ex=0,gd=0,ok=0;sub.forEach(r=>{const s=parseFloat(r['卷面成绩'])||0;if(s>=SCORE_EXCELLENT)ex++;else if(s>=SCORE_GOOD)gd++;else if(s>=SCORE_PASS)ok++;});return[ex,gd,ok];};
  const allPass=pass(rows),aicPass=pass(aic),cppPass=pass(cpp);
  const qStats={};
  objCols.forEach((c,i)=>{const r2=sub=>pctNum(sub.filter(r=>parseFloat(r[c])>0).length,sub.length);qStats['选择题第'+(i+1)+'题']={type:'rate',val:r2(rows),aicVal:r2(aic),cppVal:r2(cpp)};});
  subCols.forEach((c,j)=>{const a2=sub=>{const v=sub.map(r=>parseFloat(r[c])||0);return v.length?parseFloat((v.reduce((a,b)=>a+b,0)/v.length).toFixed(2)):0;};qStats['操作题第'+(j+1)+'题']={type:'avg',val:a2(rows),aicVal:a2(aic),cppVal:a2(cpp)};});
  return{
    total,allPass,allPassRate:pctNum(allPass,total),gradeCounts:gc(rows),
    allObjAvg:avg(rows,'客观题得分'),allSubAvg:avg(rows,'主观题得分'),allVolAvg:avg(rows,'卷面成绩'),
    aicTotal:aic.length,aicPass,aicRatio:pctNum(aic.length,total),aicPassRate:pctNum(aicPass,aic.length),
    aicGrades:gc(aic),aicObjAvg:avg(aic,'客观题得分'),aicSubAvg:avg(aic,'主观题得分'),aicVolAvg:avg(aic,'卷面成绩'),
    cppTotal:cpp.length,cppPass,cppRatio:pctNum(cpp.length,total),cppPassRate:pctNum(cppPass,cpp.length),
    cppGrades:gc(cpp),cppObjAvg:avg(cpp,'客观题得分'),cppSubAvg:avg(cpp,'主观题得分'),cppVolAvg:avg(cpp,'卷面成绩'),
    qStats
  };
}

function renderSessionCard(name,m,removed,isTotal=false){
  const rn=removed>0?`<span style="font-size:12px;color:#a0aec0;font-weight:400">（已清洗 ${removed} 条）</span>`:'';
  let qHtml='';
  if(Object.keys(m.qStats).length){
    qHtml=`<div style="margin-top:16px"><div style="font-size:13px;font-weight:600;color:#4a5568;margin-bottom:8px">每道题统计</div><table class="metrics-table"><tr><th>题目</th><th>全体</th><th>AIC++</th><th>C++小班</th></tr>`;
    Object.entries(m.qStats).forEach(([qn,{type,val,aicVal,cppVal}])=>{
      const fmt=v=>type==='rate'?v+'%':v;
      qHtml+=`<tr><td>${qn} <span style="font-size:11px;color:#a0aec0">${type==='rate'?'正确率':'均分'}</span></td><td>${fmt(val)}</td><td>${fmt(aicVal)}</td><td>${fmt(cppVal)}</td></tr>`;
    });
    qHtml+='</table></div>';
  }
  return`<div class="session-card">
    <div class="session-title">${isTotal?'📊 ':'📋 '}${name} ${rn}</div>
    <table class="metrics-table">
      <tr><th>指标</th><th>全体</th><th>AIC++</th><th>C++小班</th></tr>
      <tr class="section-row"><td colspan="4">── 基础指标 ──</td></tr>
      <tr><td>参考人数</td><td>${m.total} 人</td><td>${m.aicTotal} 人（${m.aicRatio}%）</td><td>${m.cppTotal} 人（${m.cppRatio}%）</td></tr>
      <tr><td>全卷通过率</td><td><span class="badge ${m.allPassRate>=60?'badge-pass':'badge-fail'}">${m.allPassRate}%（${m.allPass}人）</span></td><td><span class="badge ${m.aicPassRate>=60?'badge-pass':'badge-fail'}">${m.aicPassRate}%（${m.aicPass}人）</span></td><td><span class="badge ${m.cppPassRate>=60?'badge-pass':'badge-fail'}">${m.cppPassRate}%（${m.cppPass}人）</span></td></tr>
      <tr><td>优/良/合格人数</td><td>${gradeStr(m.gradeCounts)}</td><td>${gradeStr(m.aicGrades)}</td><td>${gradeStr(m.cppGrades)}</td></tr>
      <tr class="section-row"><td colspan="4">── 均分 ──</td></tr>
      <tr><td>客观题均分</td><td>${m.allObjAvg}</td><td>${m.aicObjAvg}</td><td>${m.cppObjAvg}</td></tr>
      <tr><td>主观题均分</td><td>${m.allSubAvg}</td><td>${m.aicSubAvg}</td><td>${m.cppSubAvg}</td></tr>
      <tr><td>卷面均分</td><td>${m.allVolAvg}</td><td>${m.aicVolAvg}</td><td>${m.cppVolAvg}</td></tr>
    </table>${qHtml}</div>`;
}

function renderResults(sessionMetrics,mTotal,objCols,subCols){
  const container=document.getElementById('resultContent');
  const sum=mTotal||(sessionMetrics[0]&&sessionMetrics[0].m);
  let html='';
  if(sum)html+=`<div class="summary-grid">
    <div class="stat-card"><div class="label">实际参考人数</div><div class="value">${sum.total}</div><div class="sub">人</div></div>
    <div class="stat-card"><div class="label">全卷通过率</div><div class="value">${sum.allPassRate}%</div><div class="sub">${sum.allPass}/${sum.total} 人通过</div></div>
    <div class="stat-card"><div class="label">AIC++ 通过率</div><div class="value">${sum.aicPassRate}%</div><div class="sub">${sum.aicPass}/${sum.aicTotal} 人</div></div>
    <div class="stat-card"><div class="label">C++小班通过率</div><div class="value">${sum.cppPassRate}%</div><div class="sub">${sum.cppPass}/${sum.cppTotal} 人</div></div>
  </div>`;
  sessionMetrics.forEach(({name,m,removed})=>{html+=renderSessionCard(name,m,removed);});
  if(mTotal&&sessionMetrics.length>1)html+=renderSessionCard('汇总（所有场次）',mTotal,0,true);
  container.innerHTML=html;
}

async function analyze(){
  hideError();
  if(!file1Data||!file2Data){showError('请先上传两个文件');return;}
  document.getElementById('btnAnalyze').disabled=true;
  document.getElementById('loading').style.display='block';
  document.getElementById('results').style.display='none';
  await new Promise(r=>setTimeout(r,50));
  try{
    const wb1=readWorkbook(file1Data.buf);
    let userRows=null;
    for(const sn of wb1.SheetNames){const rows=sheetToRows(wb1.Sheets[sn]);if(rows.length&&GROUP_COL in rows[0]){userRows=rows;break;}}
    if(!userRows)throw new Error(`用户总表中未找到「${GROUP_COL}」字段`);
    const seen=new Set();
    userRows=userRows.filter(r=>{const k=String(r[CERT_COL]||'');if(seen.has(k))return false;seen.add(k);return true;});

    const wb2=readWorkbook(file2Data.buf);
    const parsedSheets={};
    let globalObjCols=[],globalSubCols=[];
    wb2.SheetNames.forEach(sn=>{
      const{rows:parsed,objCols,subCols}=parseScoreSheet(sheetToRows(wb2.Sheets[sn]));

      if(objCols.length>globalObjCols.length){globalObjCols=objCols;globalSubCols=subCols;}

    const sessionMetrics=[],allCleaned=[];
    for(const sn of wb2.SheetNames){
      const{rows:scoreRows,objCols,subCols}=parsedSheets[sn];
      const joined=joinScores(userRows,scoreRows,objCols.length?objCols:globalObjCols,subCols.length?subCols:globalSubCols);

      allCleaned.push(...cleaned);
    }
    if(!sessionMetrics.length)throw new Error('未找到有效场次数据');

    const mTotal=sessionMetrics.length>1?computeMetrics(allCleaned,globalObjCols,globalSubCols):null;

// ── 单表统计 ─────────────────────────────────────────────────
function computeMetricsSingle(rows,objCols,subCols){
  if(!rows.length)return null;
  const total=rows.length;
  const pass=sub=>sub.filter(r=>{const s=parseFloat(r['卷面成绩']);return!isNaN(s)&&s>=SCORE_PASS;}).length;
  const gc=sub=>{let ex=0,gd=0,ok=0;sub.forEach(r=>{const s=parseFloat(r['卷面成绩'])||0;if(s>=SCORE_EXCELLENT)ex++;else if(s>=SCORE_GOOD)gd++;else if(s>=SCORE_PASS)ok++;});return[ex,gd,ok];};
  const allPass=pass(rows);
  const qStats={};
  objCols.forEach((c,i)=>{const v=rows.map(r=>parseFloat(r[c])||0);qStats['选择题第'+(i+1)+'题']={type:'rate',val:pctNum(v.filter(x=>x>0).length,total)};});
  subCols.forEach((c,j)=>{const v=rows.map(r=>parseFloat(r[c])||0);qStats['操作题第'+(j+1)+'题']={type:'avg',val:parseFloat((v.reduce((a,b)=>a+b,0)/v.length).toFixed(2))};});
  return{total,allPass,allPassRate:pctNum(allPass,total),gradeCounts:gc(rows),objAvg:avg(rows,'客观题得分'),subAvg:avg(rows,'主观题得分'),volAvg:avg(rows,'卷面成绩'),qStats};
}

function parseScoreSheetPython(rows){
  if(!rows.length)return{rows,objCols:[],judgeCols:[],subCols:[]};
  const headers=Object.keys(rows[0]);
  const dataCols=headers.filter(h=>!META_COLS.has(h)&&h!=='');
  let data=rows;
  if(dataCols.length&&/^\d+$/.test(String(rows[0][dataCols[0]]||'').trim()))data=rows.slice(1);
  const objCols=headers.filter(h=>h.includes('单项')||(h.includes('选择')&&!h.includes('编程')));
  const judgeCols=headers.filter(h=>h.includes('判断'));
  const subCols=headers.filter(h=>h.includes('编程')||h.includes('操作'));
  data=data.map(r=>{const nr={...r};[...objCols,...judgeCols,...subCols].forEach(c=>{nr[c]=parseFloat(nr[c])||0;});return nr;});
  return{rows:data,objCols,judgeCols,subCols};
}

function computeMetricsPython(rows,objCols,judgeCols,subCols){
  if(!rows.length)return null;
  const total=rows.length;
  const pass=sub=>sub.filter(r=>{const s=parseFloat(r['卷面成绩']);return!isNaN(s)&&s>=SCORE_PASS;}).length;
  const gc=sub=>{let ex=0,gd=0,ok=0;sub.forEach(r=>{const s=parseFloat(r['卷面成绩'])||0;if(s>=SCORE_EXCELLENT)ex++;else if(s>=SCORE_GOOD)gd++;else if(s>=SCORE_PASS)ok++;});return[ex,gd,ok];};
  const allPass=pass(rows);
  const qStats={};
  objCols.forEach((c,i)=>{const v=rows.map(r=>parseFloat(r[c])||0);qStats['选择题第'+(i+1)+'题']={type:'rate',val:pctNum(v.filter(x=>x>0).length,total)};});
  judgeCols.forEach((c,k)=>{const v=rows.map(r=>parseFloat(r[c])||0);qStats['判断题第'+(k+1)+'题']={type:'rate',val:pctNum(v.filter(x=>x>0).length,total)};});
  subCols.forEach((c,j)=>{const v=rows.map(r=>parseFloat(r[c])||0);qStats['操作题第'+(j+1)+'题']={type:'avg',val:parseFloat((v.reduce((a,b)=>a+b,0)/v.length).toFixed(2))};});
  return{
    total,allPass,allPassRate:pctNum(allPass,total),gradeCounts:gc(rows),
    objAvg:avg(rows,'客观题得分'),judgeAvg:avg(rows,'判断题得分'),subAvg:avg(rows,'主观题得分'),volAvg:avg(rows,'卷面成绩'),
    hasJudge:judgeCols.length>0,qStats
  };
}

    aoa.push(['── 基础指标 ──','']);
    aoa.push(['实际参考人数（人）',m.total]);aoa.push(['全卷通过率（%）',m.allPassRate]);
    aoa.push(['通过人数（人）',m.allPass]);aoa.push(['不合格（人）',m.total-m.allPass]);
    aoa.push(['合格 60-74（人）',m.gradeCounts[2]]);aoa.push(['良好 75-89（人）',m.gradeCounts[1]]);aoa.push(['优秀 ≥90（人）',m.gradeCounts[0]]);
    aoa.push(['── 均分 ──','']);
    aoa.push(['客观题均分',m.objAvg]);
    if(hasJudge)aoa.push(['判断题均分',m.judgeAvg]);
    aoa.push(['操作题均分',m.subAvg]);aoa.push(['卷面均分',m.volAvg]);
    aoa.push(['── 每道题统计 ──','']);
    qNames.forEach(qn=>{const{type,val}=m.qStats[qn];aoa.push([qn+'（'+(type==='rate'?'正确率':'均分')+'）',type==='rate'?val+'%':val]);});
    aoa.push(['','']);
  });
  const ws=XLSX.utils.aoa_to_sheet(aoa);ws['!cols']=[{wch:26},{wch:16}];
  XLSX.utils.book_append_sheet(wb,ws,'统计结果');
  XLSX.writeFile(wb,'result_python.xlsx');
}

// ── 重置 ────────────────────────────────────────────────────
function resetAll(){
  file1Data=null;file2Data=null;file3Data=null;file4Data=null;
  lastSessionMetrics=[];lastObjCols=[];lastSubCols=[];lastMTotal=null;
  lastPyMetrics=[];lastPyObjCols=[];lastPyJudgeCols=[];lastPySubCols=[];lastPyMTotal=null;
  [1,2,3,4].forEach(n=>{
    document.getElementById('drop'+n).classList.remove('has-file','drag-over');
    document.getElementById('name'+n).textContent='';
    document.getElementById('file'+n).value='';
  });
  document.getElementById('results').style.display='none';
  document.getElementById('loading').style.display='none';
  ['btnAnalyze','btnAnalyzeSingle','btnAnalyzePython'].forEach(id=>document.getElementById(id).disabled=false);
  hideError();
}
